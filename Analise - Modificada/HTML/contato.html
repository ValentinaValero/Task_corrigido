<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - TaskMaster Pro</title>
    <link rel="stylesheet" href="../CSS/contato.css">
</head>

<body>

    <header>
        <nav>
            <a href="inicio.html">Inicio</a>
            <a href="sobre.html">Sobre</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <form method="POST" action="#" novalidate>
                <h2>Fale Conosco</h2>

                <label for="nome">Nome</label>
                <input id="nome" name="nome" type="text" required placeholder="Digite seu nome">

                <label for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="Digite um e-mail válido">

                <label for="assunto">Assunto</label>
                <select id="assunto" name="assunto" required>
                    <option value="selecionar">Selecione</option>
                    <option value="duvida">Dúvida</option>
                    <option value="suporte">Suporte</option>
                    <option value="outro">Outro</option>
                </select>

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" required placeholder="Digite sua mensagem"></textarea>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 - TaskMaster Pro | Sistema de Gerenciamento de Tarefas</p>
    </footer>

    <script src="../JS/contato.js"></script>

</body>

</html>
